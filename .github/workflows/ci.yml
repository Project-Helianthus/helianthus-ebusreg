name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  terminology:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if git grep -nIwiE 'm[a]ster|s[l]ave' -- ':!vendor/'; then
            echo "Found legacy terminology."
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: git config --global url."https://${{ secrets.REPO_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - run: go vet ./...
      - run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: git config --global url."https://${{ secrets.REPO_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - run: go test -race -count=1 ./...

  tinygo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: git config --global url."https://${{ secrets.REPO_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: '0.40.1'
      - run: |
          mains=$(go list -f '{{if eq .Name "main"}}{{.ImportPath}}{{end}}' ./... | sed '/^$/d')
          if [ -z "$mains" ]; then
            echo "No main packages found; skipping TinyGo build."
            exit 0
          fi
          for pkg in $mains; do
            echo "tinygo build -target esp32 $pkg"
            tinygo build -target esp32 "$pkg"
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: git config --global url."https://${{ secrets.REPO_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - uses: golangci/golangci-lint-action@v6
